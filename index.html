<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Products Dashboard</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div>
        <h1 class="h4 mb-1">Products Dashboard</h1>
        <div class="text-secondary small">Data from Escuelajs API • Search + Sort + Pagination</div>
      </div>
      <button id="btnReload" class="btn btn-outline-primary btn-sm">Reload</button>
    </div>

    <!-- Controls -->
    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-6">
            <label class="form-label">Search by Title (onChange)</label>
            <input id="searchInput" class="form-control" placeholder="Nhập title..." />
            <div class="form-text">Kết quả đổi ngay khi bạn gõ (input + change).</div>
          </div>

          <div class="col-6 col-md-3">
            <label class="form-label">Limit / page</label>
            <select id="limitSelect" class="form-select">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="20">20</option>
            </select>
          </div>

          <div class="col-6 col-md-3">
            <label class="form-label">Status</label>
            <div id="statusBadge" class="badge text-bg-secondary w-100 text-start">Idle</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th style="width: 90px;">Image</th>

                <th>
                  Title
                  <button class="sort-btn" id="sortTitle" type="button" title="Sort title">
                    <span class="sort-indicator" id="sortTitleInd">↕</span>
                  </button>
                </th>

                <th style="width: 180px;">Category</th>

                <th style="width: 140px;" class="text-end">
                  Price
                  <button class="sort-btn" id="sortPrice" type="button" title="Sort price">
                    <span class="sort-indicator" id="sortPriceInd">↕</span>
                  </button>
                </th>

                <th style="width: 120px;" class="text-end">ID</th>
              </tr>
            </thead>

            <tbody id="tbody"></tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mt-3">
          <div class="text-secondary small" id="pagingInfo">—</div>

          <nav aria-label="Pagination">
            <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
          </nav>
        </div>
      </div>
    </div>

    <div class="text-center text-secondary small mt-3">
      Tip: Hover đúng dòng để xem description ✨
    </div>
  </div>

  <!-- Bootstrap JS (tooltip) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="script.js"></script>
</body>
</html>
